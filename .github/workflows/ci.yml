name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout tutorial
        uses: actions/checkout@v4
        with: { path: docs/tutorial }
      - name: Checkout compatible Eidosc
        shell: pwsh
        env:
          EIDOSC_REF: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          $repository = "https://github.com/dlqw/Eidosc.git"
          git ls-remote --exit-code --heads $repository "refs/heads/$env:EIDOSC_REF"
          $ref = if ($LASTEXITCODE -eq 0) { $env:EIDOSC_REF } else { "main" }
          git clone --depth 1 --branch $ref $repository Eidosc
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - name: Build Eidosc
        run: dotnet build Eidosc/Eidosc.sln --nologo
      - name: Verify language release metadata
        run: powershell -NoProfile -ExecutionPolicy Bypass -File docs/tutorial/scripts/verify-release-metadata.ps1
      - name: Verify tutorial examples
        run: powershell -NoProfile -ExecutionPolicy Bypass -File docs/tutorial/verify-examples.ps1 -NoBuild
