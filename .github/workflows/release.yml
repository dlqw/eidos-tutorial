name: Release Eidos Language

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact Eidos language SemVer
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify release metadata
        run: |
          set -euo pipefail
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          declared="$(sed -n 's/^version = "\([^"]*\)"/\1/p' eidos-language.toml | head -n1)"
          test "$declared" = "${{ inputs.version }}"
          test -f "changelogs/$declared.md"
      - name: Publish language release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "eidos-v${{ inputs.version }}" --target "$GITHUB_SHA" --prerelease --title "Eidos ${{ inputs.version }}" --notes-file "changelogs/${{ inputs.version }}.md"
